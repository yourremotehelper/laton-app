<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laton Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --cream:#f8f5f0;--ink:#1c1a18;--gold:#b8974a;--gold-light:#e8dcc8;
  --warm:#e2dbd0;--muted:#8a8278;--white:#fff;--border:1px solid #d8d0c4;--radius:3px;
  --success-bg:#e6f5ee;--success:#1a6640;--warn-bg:#fef3e2;--warn:#7a4f00;
  --danger-bg:#fdecea;--danger:#8b2020;--info-bg:#e8f0fe;--info:#1a4fd6;
}
body{font-family:'DM Mono',monospace;background:var(--cream);color:var(--ink);min-height:100vh;font-size:13px;}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;min-height:100vh;}
header{background:var(--ink);height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;position:sticky;top:0;z-index:200;}
.logo{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:300;letter-spacing:0.2em;color:#fff;}
.logo em{color:var(--gold);font-style:normal;}
.app-body{display:flex;flex:1;}
nav{width:200px;background:var(--ink);min-height:calc(100vh - 54px);padding:1.5rem 0;position:sticky;top:54px;height:calc(100vh - 54px);overflow-y:auto;flex-shrink:0;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:#aaa;cursor:pointer;font-size:12px;letter-spacing:0.05em;transition:all 0.15s;border-left:2px solid transparent;}
.nav-item:hover{color:#fff;background:rgba(255,255,255,0.05);}
.nav-item.active{color:var(--gold);border-left-color:var(--gold);background:rgba(184,151,74,0.08);}
.nav-icon{font-size:14px;width:18px;text-align:center;}
.nav-section{font-size:9px;color:#555;letter-spacing:0.12em;text-transform:uppercase;padding:12px 20px 4px;}
.content{flex:1;padding:2rem;max-width:1000px;}

/* ── COMPONENTES ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius);font-size:12px;font-family:'DM Mono',monospace;cursor:pointer;border:none;transition:all 0.15s;}
.btn-gold{background:var(--gold);color:#fff;}.btn-gold:hover{background:#a0832e;}
.btn-ink{background:var(--ink);color:#fff;border:var(--border);}.btn-ink:hover{background:#333;}
.btn-ghost{background:transparent;color:var(--ink);border:var(--border);}.btn-ghost:hover{background:var(--warm);}
.btn-danger{background:transparent;color:var(--danger);border:1px solid #f5c0c0;}.btn-danger:hover{background:var(--danger-bg);}
.btn-sm{padding:4px 10px;font-size:11px;}

.card{background:var(--white);border:var(--border);border-radius:4px;padding:1.25rem;}
.card-gold{border-top:3px solid var(--gold);}

.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:10px;}
.page-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;color:var(--ink);letter-spacing:0.05em;}

.field{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;}
.field label{font-size:10px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;}
.field input,.field select,.field textarea{font-family:'DM Mono',monospace;font-size:13px;padding:8px 10px;border:var(--border);border-radius:var(--radius);background:var(--cream);color:var(--ink);outline:none;width:100%;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold);background:var(--white);}
.field textarea{resize:vertical;min-height:70px;line-height:1.6;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.full{grid-column:1/-1;}

.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:400;}
.badge-success{background:var(--success-bg);color:var(--success);}
.badge-warn{background:var(--warn-bg);color:var(--warn);}
.badge-danger{background:var(--danger-bg);color:var(--danger);}
.badge-info{background:var(--info-bg);color:var(--info);}
.badge-neutral{background:var(--warm);color:var(--muted);}

.search-bar{display:flex;gap:10px;margin-bottom:1rem;flex-wrap:wrap;}
.search-bar input,.search-bar select{font-family:'DM Mono',monospace;font-size:13px;padding:7px 10px;border:var(--border);border-radius:var(--radius);background:var(--white);color:var(--ink);outline:none;}
.search-bar input{flex:1;min-width:180px;}
.search-bar input:focus,.search-bar select:focus{border-color:var(--gold);}

/* ── GRID TARJETAS ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px;}
.item-card{background:var(--white);border:var(--border);border-radius:4px;padding:1rem 1.1rem;cursor:pointer;transition:border-color 0.15s,box-shadow 0.15s;}
.item-card:hover{border-color:#bbb;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.item-card-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0;}
.item-name{font-size:14px;font-weight:500;color:var(--ink);line-height:1.3;}
.item-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.item-meta{font-size:12px;color:#666;display:flex;flex-direction:column;gap:4px;}
.meta-row{display:flex;gap:6px;}
.meta-lbl{min-width:64px;color:#bbb;font-size:11px;flex-shrink:0;}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:300;align-items:flex-start;justify-content:center;padding:2rem;overflow-y:auto;}
.overlay.open{display:flex;}
.modal{background:var(--white);border-radius:6px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;}
.modal-bar{background:var(--ink);color:#fff;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;border-radius:6px 6px 0 0;}
.modal-bar h3{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:300;letter-spacing:0.08em;}
.modal-body{padding:1.5rem;}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;padding:0 1.5rem 1.5rem;}
.close-x{background:transparent;border:none;color:#fff;font-size:22px;cursor:pointer;}

/* ── DRAWER DETALLE ── */
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:250;}
.drawer-overlay.open{display:block;}
.drawer{position:fixed;top:0;right:-480px;width:480px;height:100vh;background:var(--white);z-index:260;transition:right 0.25s ease;overflow-y:auto;box-shadow:-4px 0 20px rgba(0,0,0,0.12);}
.drawer.open{right:0;}
.drawer-bar{background:var(--ink);color:#fff;padding:1rem 1.5rem;display:flex;align-items:center;gap:12px;position:sticky;top:0;}
.drawer-bar h3{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;letter-spacing:0.05em;flex:1;}
.drawer-body{padding:1.5rem;}
.detail-row{display:flex;padding:8px 0;border-top:1px solid var(--warm);gap:14px;}
.detail-lbl{font-size:11px;color:var(--muted);min-width:100px;flex-shrink:0;padding-top:1px;}
.detail-val{font-size:13px;color:var(--ink);flex:1;word-break:break-word;}
.sec-title-sm{font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--gold);margin:1rem 0 0.5rem;letter-spacing:0.05em;}

/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.5rem;}
.stat-card{background:var(--white);border:var(--border);border-radius:4px;padding:1rem;}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--ink);}
.stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-top:2px;}

/* ── TABLA ── */
.table-wrap{overflow-x:auto;}
table.data-table{width:100%;border-collapse:collapse;font-size:12px;}
.data-table th{padding:6px 10px;background:var(--gold-light);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;font-weight:400;text-align:left;white-space:nowrap;}
.data-table td{padding:8px 10px;border-bottom:1px solid var(--warm);vertical-align:top;}
.data-table tr:hover td{background:#fdfcfa;}

/* ── KANBAN ── */
.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;align-items:start;}
.kanban-col{background:var(--cream);border:var(--border);border-radius:4px;padding:10px;}
.kanban-col-title{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:10px;padding:0 4px;}
.kanban-card{background:var(--white);border:var(--border);border-radius:3px;padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:border-color 0.15s;}
.kanban-card:hover{border-color:#bbb;}
.kanban-card-title{font-size:13px;color:var(--ink);margin-bottom:4px;font-weight:500;}
.kanban-card-sub{font-size:11px;color:var(--muted);}
.add-kanban{width:100%;background:transparent;border:1px dashed var(--warm);border-radius:3px;padding:7px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);cursor:pointer;margin-top:4px;}
.add-kanban:hover{border-color:var(--gold);color:var(--gold);}

/* ── CONFIGURACIÓN ── */
.config-section{margin-bottom:1.5rem;}
.config-section h3{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;}
.config-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--warm);}
.config-item span{flex:1;font-size:13px;}
.config-item-edit{font-size:11px;background:transparent;border:none;color:var(--muted);cursor:pointer;padding:2px 6px;}
.config-item-edit:hover{color:var(--gold);}
.config-item-del{font-size:14px;background:transparent;border:none;color:#ccc;cursor:pointer;padding:2px 4px;}
.config-item-del:hover{color:var(--danger);}

.empty-state{text-align:center;padding:3rem 1rem;color:var(--muted);}
.empty-state p{font-size:13px;margin-top:8px;}

.loading{text-align:center;padding:2rem;color:var(--muted);font-size:13px;}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--ink);color:#fff;padding:10px 18px;border-radius:var(--radius);font-size:12px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999;border-left:3px solid var(--gold);}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div class="app">
<header>
  <div class="logo">LATON <em>Studio</em></div>
  <div style="font-size:11px;color:#555;letter-spacing:0.1em;">GESTIÓN INTERNA</div>
</header>
<div class="app-body">
  <nav>
    <div class="nav-section">Principal</div>
    <div class="nav-item active" onclick="showPage('dashboard')" id="nav-dashboard">
      <span class="nav-icon">◈</span> Dashboard
    </div>
    <div class="nav-section">Módulos</div>
    <div class="nav-item" onclick="showPage('clientes')" id="nav-clientes">
      <span class="nav-icon">◎</span> Clientes
    </div>
    <div class="nav-item" onclick="showPage('presupuestos')" id="nav-presupuestos">
      <span class="nav-icon">◻</span> Presupuestos
    </div>
    <div class="nav-item" onclick="showPage('proveedores')" id="nav-proveedores">
      <span class="nav-icon">◇</span> Proveedores
    </div>
    <div class="nav-item" onclick="showPage('tareas')" id="nav-tareas">
      <span class="nav-icon">◈</span> Tareas
    </div>
    <div class="nav-section">Sistema</div>
    <div class="nav-item" onclick="showPage('configuracion')" id="nav-configuracion">
      <span class="nav-icon">⊙</span> Configuración
    </div>
  </nav>
  <div class="content" id="content">
    <div class="loading">Cargando...</div>
  </div>
</div>
</div>

<!-- Drawer detalle -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-bar">
    <h3 id="drawerTitle">Detalle</h3>
    <button class="close-x" onclick="closeDrawer()">×</button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</div>

<!-- Modal genérico -->
<div class="overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-bar">
      <h3 id="modalTitle">—</h3>
      <button class="close-x" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycby46HyyxTXBewK1FkyRYbnYz1njAdbiZVT-rw6gfO9QX7MdvrY3Irxpg3UHI5FcCd4y/exec';

// ── Estado global ────────────────────────────────────────────────
let G = { clientes:[], proveedores:[], presupuestos:[], tareas:[], config:{}, estudio:{} };

// ── API ──────────────────────────────────────────────────────────
async function api(action, data){
  try {
    const res = await fetch(API, {method:'POST', body:JSON.stringify({action,...data})});
    return await res.json();
  } catch(e){ toast('Error de conexión'); return {error:e.message}; }
}
async function apiGet(action){
  try {
    const res = await fetch(API+'?action='+action);
    return await res.json();
  } catch(e){ toast('Error de conexión'); return {error:e.message}; }
}

// ── Helpers ──────────────────────────────────────────────────────
const fmt = v => (+v||0).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
function initials(n){ return String(n||'?').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase(); }
const COLORS=[{bg:'#e8f0fe',c:'#1a4fd6'},{bg:'#e6f5ee',c:'#1a6640'},{bg:'#fef3e2',c:'#7a4f00'},{bg:'#f0eaff',c:'#5b21b6'},{bg:'#fdecea',c:'#8b1f1f'},{bg:'#e8f8f5',c:'#0f6b5a'},{bg:'#fce8f3',c:'#831843'}];
function colorFor(s){ let h=0; for(let c of String(s||'')) h=(h*31+c.charCodeAt(0))%COLORS.length; return COLORS[h]; }
function cfgList(clave){ return (G.config[clave]||[]).map(x=>x.valor); }
function selOpts(clave, selected=''){ return cfgList(clave).map(v=>`<option value="${v}"${v===selected?' selected':''}>${v}</option>`).join(''); }
function badgeEstado(e){
  const map={'Activo':'success','En curso':'success','Pendiente':'warn','Cerrado':'neutral','Borrador':'neutral','Alta':'danger','Normal':'warn','Baja':'neutral','Disponibilidad alta':'success','Plazo normal':'warn','Plazo largo':'danger'};
  return `<span class="badge badge-${map[e]||'neutral'}">${e||'—'}</span>`;
}

// ── Navegación ───────────────────────────────────────────────────
function showPage(page){
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('nav-'+page)?.classList.add('active');
  const pages = {dashboard:renderDashboard, clientes:renderClientes, proveedores:renderProveedores, presupuestos:renderPresupuestos, tareas:renderTareas, configuracion:renderConfiguracion};
  if(pages[page]) pages[page]();
}

// ── Drawer / Modal ───────────────────────────────────────────────
function openDrawer(title, html){
  document.getElementById('drawerTitle').textContent=title;
  document.getElementById('drawerBody').innerHTML=html;
  document.getElementById('drawerOverlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}
function closeDrawer(){
  document.getElementById('drawerOverlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}
function openModal(title, bodyHtml, footerHtml=''){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=bodyHtml;
  document.getElementById('modalFooter').innerHTML=footerHtml;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); }
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.getElementById('drawerOverlay').addEventListener('click',closeDrawer);

// ── DASHBOARD ────────────────────────────────────────────────────
function renderDashboard(){
  const c=document.getElementById('content');
  const nCli=G.clientes.length, nProv=G.proveedores.length;
  const nPres=G.presupuestos.length;
  const nTar=G.tareas.filter(t=>t.estado!=='Cerrado').length;
  const totalPres=G.presupuestos.reduce((a,p)=>a+(+p.total_con_iva||0),0);
  c.innerHTML=`
    <div class="page-header"><div class="page-title">Dashboard</div></div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num">${nCli}</div><div class="stat-lbl">Clientes</div></div>
      <div class="stat-card"><div class="stat-num">${nPres}</div><div class="stat-lbl">Presupuestos</div></div>
      <div class="stat-card"><div class="stat-num">${nProv}</div><div class="stat-lbl">Proveedores</div></div>
      <div class="stat-card"><div class="stat-num">${nTar}</div><div class="stat-lbl">Tareas activas</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
      <div class="card card-gold">
        <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;">Últimos clientes</div>
        ${G.clientes.slice(-4).reverse().map(cl=>{const col=colorFor(cl.nombre);return`
        <div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--warm);cursor:pointer;" onclick="showPage('clientes')">
          <div class="avatar" style="width:30px;height:30px;font-size:11px;background:${col.bg};color:${col.c};">${initials(cl.nombre)}</div>
          <div><div style="font-size:13px;">${cl.nombre}</div><div style="font-size:11px;color:var(--muted);">${cl.tipo||'—'}</div></div>
        </div>`}).join('')||'<div style="color:var(--muted);font-size:12px;padding:8px 0;">Sin clientes aún</div>'}
      </div>
      <div class="card card-gold">
        <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;">Tareas pendientes</div>
        ${G.tareas.filter(t=>t.estado==='Pendiente').slice(0,4).map(t=>`
        <div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--warm);">
          <div style="flex:1;font-size:13px;">${t.titulo}</div>
          ${badgeEstado(t.prioridad||'Normal')}
        </div>`).join('')||'<div style="color:var(--muted);font-size:12px;padding:8px 0;">Sin tareas pendientes</div>'}
      </div>
    </div>`;
}

// ── CLIENTES ─────────────────────────────────────────────────────
function renderClientes(){
  const c=document.getElementById('content');
  c.innerHTML=`
    <div class="page-header">
      <div class="page-title">Clientes</div>
      <button class="btn btn-gold" onclick="modalNuevoCliente()">+ Nuevo cliente</button>
    </div>
    <div class="search-bar">
      <input type="text" id="searchCli" placeholder="Buscar cliente..." oninput="filterClientes()">
      <select id="filtTipo" onchange="filterClientes()"><option value="">Todos los tipos</option>${cfgList('tipo_cliente').map(v=>`<option>${v}</option>`).join('')}</select>
    </div>
    <div class="stats" id="statsCli" style="font-size:12px;color:var(--muted);margin-bottom:1rem;"></div>
    <div class="cards-grid" id="gridCli"></div>`;
  filterClientes();
}

function filterClientes(){
  const q=(document.getElementById('searchCli')?.value||'').toLowerCase();
  const tipo=document.getElementById('filtTipo')?.value||'';
  const filtered=G.clientes.filter(cl=>{
    const txt=(cl.nombre+cl.email+cl.telefono+cl.ciudad+cl.notas).toLowerCase();
    return (!q||txt.includes(q))&&(!tipo||cl.tipo===tipo);
  });
  document.getElementById('statsCli').textContent=`${filtered.length} cliente${filtered.length!==1?'s':''} ${G.clientes.length!==filtered.length?'de '+G.clientes.length:'en total'}`;
  const grid=document.getElementById('gridCli');
  if(!grid) return;
  if(!filtered.length){ grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1"><p>${G.clientes.length?'Sin resultados.':'Aún no hay clientes. Añade el primero.'}</p></div>`; return; }
  grid.innerHTML=filtered.map(cl=>{
    const col=colorFor(cl.nombre);
    return`<div class="item-card" onclick="drawerCliente('${cl.id}')">
      <div class="item-card-head">
        <div class="avatar" style="background:${col.bg};color:${col.c};">${initials(cl.nombre)}</div>
        <div><div class="item-name">${cl.nombre}</div><div class="item-sub">${cl.ref||''}</div></div>
        <div style="margin-left:auto;">${badgeEstado(cl.tipo)}</div>
      </div>
      <div class="item-meta">
        ${cl.telefono?`<div class="meta-row"><span class="meta-lbl">Teléfono</span><span>${cl.telefono}</span></div>`:''}
        ${cl.email?`<div class="meta-row"><span class="meta-lbl">Email</span><span style="word-break:break-all;">${cl.email}</span></div>`:''}
        ${cl.ciudad?`<div class="meta-row"><span class="meta-lbl">Ciudad</span><span>${cl.ciudad}</span></div>`:''}
      </div>
    </div>`;
  }).join('');
}

function drawerCliente(id){

            <option value="Enviado">Enviado</option>
            <option value="Aprobado">Aprobado</option>
            <option value="Rechazado">Rechazado</option>
          </select>
        </div>
      </div>
    </div>

    <div id="presPartidas"></div>
    <div style="margin:10px 0;"><button class="btn btn-ink btn-sm" onclick="modalAnadirPartida()">+ Añadir partida</button></div>

    <div class="card card-gold" style="margin-top:1rem;">
      <div style="font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:1rem;">Resumen</div>
      <table style="width:100%;border-collapse:collapse;font-size:12px;" id="presResumen">
        <thead><tr style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;">
          <th style="padding:5px 8px;text-align:left;font-weight:400;">Partida</th>
          <th style="padding:5px 8px;text-align:right;font-weight:400;">Sin IVA</th>
          <th style="padding:5px 8px;text-align:right;font-weight:400;">Con IVA</th>
        </tr></thead>
        <tbody id="presResumenBody"></tbody>
      </table>
    </div>`;

  if(clienteId) autocompletarCliente(clienteId);
  presRenderPartidas();
}

function autocompletarCliente(id){
  const cli=G.clientes.find(x=>String(x.id)===String(id));
  if(!cli) return;
  if(document.getElementById('pr_dir')&&!document.getElementById('pr_dir').value) document.getElementById('pr_dir').value=cli.dir_obra||'';
  if(document.getElementById('pr_pago')&&!document.getElementById('pr_pago').value) document.getElementById('pr_pago').value=cli.forma_pago||'';
}

function presAddPartida(nombre){
  const id=npid();
  presState.partidas.push({id,nombre:nombre||'',collapsed:false,subs:[{id:npid(),nombre:'',lineas:[]}]});
  presRenderPartidas();
}

function presAddSub(pid){
  const p=presState.partidas.find(x=>x.id===pid);
  if(p){ p.subs.push({id:npid(),nombre:'',lineas:[]}); presRenderPartidas(); }
}

function presAddLinea(pid,sid){
  const p=presState.partidas.find(x=>x.id===pid);
  if(!p) return;
  const s=p.subs.find(x=>x.id===sid);
  if(s){ s.lineas.push({id:npid(),desc:'',detalle:'',ud:'UD',cant:1,pProv:0,margen:15,iva:21,url:''}); presRenderPartidas(); }
}

function presDelPartida(pid){ if(!confirm('¿Eliminar esta partida?')) return; presState.partidas=presState.partidas.filter(x=>x.id!==pid); presRenderPartidas(); }
function presDelSub(pid,sid){ const p=presState.partidas.find(x=>x.id===pid); if(!p||p.subs.length<=1){alert('Mínimo un bloque.');return;} if(!confirm('¿Eliminar?')) return; p.subs=p.subs.filter(x=>x.id!==sid); presRenderPartidas(); }
function presDelLinea(pid,sid,lid){ const p=presState.partidas.find(x=>x.id===pid); if(!p) return; const s=p.subs.find(x=>x.id===sid); if(s){s.lineas=s.lineas.filter(x=>x.id!==lid); presRenderPartidas();} }
function presToggle(pid){ const p=presState.partidas.find(x=>x.id===pid); if(p){p.collapsed=!p.collapsed; presRenderPartidas();} }

function slugClave(s){ return String(s||'').toLowerCase().replace(/[^a-z0-9]/g,'_').replace(/_+/g,'_'); }

function abrirCatalogoDesc(pid, sid, lid, clave){
  const items = G.config['desc_'+clave]||[];
  if(!items.length){
    toast('No hay descripciones en el catálogo para esta partida. Puedes añadirlas en Configuración.');
    return;
  }
  openModal('Seleccionar descripción',`
    <div style="font-size:12px;color:var(--muted);margin-bottom:1rem;">Selecciona una descripción del catálogo o escribe directamente en el campo.</div>
    ${items.map(item=>{
      const parts = item.valor.split('||');
      return `<div style="padding:8px 10px;border:var(--border);border-radius:var(--radius);margin-bottom:6px;cursor:pointer;transition:border-color 0.15s;" onmouseover="this.style.borderColor='var(--gold)'" onmouseout="this.style.borderColor='#d8d0c4'" onclick="aplicarDescripcion(${pid},${sid},${lid},'${item.valor.replace(/'/g,"\'")}');closeModal()">
        <div style="font-size:13px;font-weight:500;">${parts[0]}</div>
        ${parts[1]?`<div style="font-size:11px;color:var(--muted);margin-top:3px;line-height:1.5;">${parts[1]}</div>`:''}
      </div>`;
    }).join('')}`,`
    <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>`);
}

function aplicarDescripcion(pid, sid, lid, valor){
  const parts = valor.split('||');
  const p = presState.partidas.find(x=>x.id===pid); if(!p) return;
  const s = p.subs.find(x=>x.id===sid); if(!s) return;
  const l = s.lineas.find(x=>x.id===lid); if(!l) return;
  l.desc = parts[0]||'';
  l.detalle = parts[1]||'';
  presRenderPartidas();
  presRecalcTotals();
}

function modalAnadirPartida(){
  const extras = (G.config['partidas_presupuesto']||[]).map(x=>x.valor);
  const optsExtras = extras.length
    ? extras.map(p=>`<option value="${p}">${p}</option>`).join('')
    : '';

  openModal('Añadir partida',`
    <div class="field">
      <label>Selecciona una partida personalizada</label>
      <select id="nueva_partida_sel"
        style="font-family:'DM Mono',monospace;font-size:13px;padding:8px 10px;border:var(--border);border-radius:var(--radius);background:var(--cream);outline:none;width:100%;"
        onchange="document.getElementById('nueva_partida_custom_wrap').style.display=this.value==='__nueva__'?'block':'none'">
        ${optsExtras}
        <option value="__nueva__">Escribir nombre nuevo...</option>
      </select>
    </div>
    <div id="nueva_partida_custom_wrap" style="display:none;" class="field">
      <label>Nombre de la nueva partida</label>
      <input type="text" id="nueva_partida_custom" placeholder="Ej. INSTALACIONES ESPECIALES">
    </div>`,`
    <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-gold" onclick="confirmarAnadirPartida()">Añadir</button>`);

  // Si no hay extras, mostrar directamente el campo de texto
  if(!extras.length){
    const sel = document.getElementById('nueva_partida_sel');
    if(sel) sel.closest('.field').style.display='none';
    document.getElementById('nueva_partida_custom_wrap').style.display='block';
  }
}

function confirmarAnadirPartida(){
  const sel = document.getElementById('nueva_partida_sel');
  let nombre = '';
  if(!sel || sel.value === '__nueva__'){
    nombre = document.getElementById('nueva_partida_custom')?.value.trim()||'';
  } else {
    nombre = sel.value;
  }
  if(!nombre){ toast('Escribe el nombre de la partida'); return; }
  closeModal();
  presAddPartida(nombre);
  presRenderPartidas();
  presRecalcTotals();
}

function presCalcL(l){
  const cant=numP(l.cant),pp=numP(l.pProv),m=numP(l.margen)/100,iv=numP(l.iva)/100;
  const pCli=pp*(1+m),pCliIva=pCli*(1+iv);
  return{pCli,pCliIva,tProv:pp*cant,tCli:pCli*cant,tCliIva:pCliIva*cant,margenE:(pCli-pp)*cant};
}
function presCalcS(s){return s.lineas.reduce((a,l)=>{const c=presCalcL(l);a.tCli+=c.tCli;a.tCliIva+=c.tCliIva;a.margenE+=c.margenE;return a;},{tCli:0,tCliIva:0,margenE:0});}
function presCalcP(p){return p.subs.reduce((a,s)=>{const c=presCalcS(s);a.tCli+=c.tCli;a.tCliIva+=c.tCliIva;a.margenE+=c.margenE;return a;},{tCli:0,tCliIva:0,margenE:0});}

function presMargenSel(val){
  const v=numP(val); const opts=[...new Set([...MARGENES_PRES,v])].sort((a,b)=>a-b);
  return`<select data-pt="margen" style="font-family:'DM Mono',monospace;font-size:11px;padding:3px 4px;border:1px solid var(--warm);border-radius:2px;background:var(--cream);width:100%;outline:none;" onchange="presOnSel(this,'margen')">${opts.map(o=>`<option value="${o}"${o===v?' selected':''}>${o}%</option>`).join('')}<option value="__c__">Otro...</option></select>`;
}
function presIvaSel(val){
  const v=numP(val); const opts=[...new Set([...IVAS_PRES,v])].sort((a,b)=>a-b);
  return`<select data-pt="iva" style="font-family:'DM Mono',monospace;font-size:11px;padding:3px 4px;border:1px solid var(--warm);border-radius:2px;background:var(--cream);width:100%;outline:none;" onchange="presOnSel(this,'iva')">${opts.map(o=>`<option value="${o}"${o===v?' selected':''}>${o}%</option>`).join('')}<option value="__c__">Otro...</option></select>`;
}
function presOnSel(sel,tipo){
  if(sel.value==='__c__'){
    const v=prompt(`${tipo==='margen'?'Margen':'IVA'} personalizado (%):','`);
    if(!v){sel.value=tipo==='margen'?15:21;return;}
    const nv=parseFloat(v); if(isNaN(nv)){sel.value=tipo==='margen'?15:21;return;}
    if(![...sel.options].find(o=>+o.value===nv)){const opt=document.createElement('option');opt.value=nv;opt.textContent=nv+'%';sel.insertBefore(opt,sel.lastElementChild);}
    sel.value=nv;
  }
  presCalcRow(sel.closest('.pres-linea'));
  presRecalc();
}

function presCalcRow(row){
  if(!row) return;
  const pp=numP(row.querySelector('[data-pf="pProv"]')?.value);
  const cant=numP(row.querySelector('[data-pf="cant"]')?.value);
  const m=numP(row.querySelector('[data-pt="margen"]')?.value)/100;
  const iv=numP(row.querySelector('[data-pt="iva"]')?.value)/100;
  const pCli=pp*(1+m),pCliIva=pCli*(1+iv),tCliIva=pCliIva*cant;
  const o1=row.querySelector('[data-pout="pCli"]'),o2=row.querySelector('[data-pout="pCliIva"]'),o3=row.querySelector('[data-pout="tCliIva"]');
  if(o1)o1.textContent=fmtN(pCli);
  if(o2)o2.textContent=fmtN(pCliIva);
  if(o3)o3.textContent=fmtN(tCliIva);
  // sync to state
  const lid=+row.dataset.lid;
  for(const p of presState.partidas) for(const s of p.subs){const l=s.lineas.find(x=>x.id===lid);if(l){l.pProv=pp;l.cant=cant;l.margen=numP(row.querySelector('[data-pt="margen"]')?.value);l.iva=numP(row.querySelector('[data-pt="iva"]')?.value);}}
  presRecalcTotals();
}

function presRecalc(){
  document.querySelectorAll('.pres-linea').forEach(row=>presCalcRow(row));
  presRecalcTotals();
}

function presRecalcTotals(){
  let totSinIva=0,totConIva=0;
  const rows=presState.partidas.map((p,pi)=>{
    const t=presCalcP(p);
    totSinIva+=t.tCli;totConIva+=t.tCliIva;
    const el=document.querySelector(`[data-ptot="${p.id}"]`);
    if(el)el.textContent=fmtN(t.tCliIva)+' IVA inc.';
    return`<tr><td style="color:var(--muted);font-size:11px;padding:5px 8px;">${String(pi+1).padStart(2,'0')}. ${p.nombre||'Sin nombre'}</td><td style="text-align:right;padding:5px 8px;">${fmtN(t.tCli)}</td><td style="text-align:right;padding:5px 8px;">${fmtN(t.tCliIva)}</td></tr>`;
  }).join('');
  const feePct=numP(document.getElementById('pr_feePct')?.value||0);
  const feeFixed=numP(document.getElementById('pr_feeFixed')?.value||0);
  const feeImp=feePct>0?totSinIva*(feePct/100):feeFixed;
  const grand=totConIva+feeImp;
  const body=document.getElementById('presResumenBody');
  if(body) body.innerHTML=rows+`
    <tr style="border-top:2px solid var(--ink);"><td style="padding:6px 8px;font-size:13px;">Total obra</td><td style="text-align:right;padding:6px 8px;">${fmtN(totSinIva)}</td><td style="text-align:right;padding:6px 8px;">${fmtN(totConIva)}</td></tr>
    <tr><td style="padding:5px 8px;color:var(--muted);">
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">Fee del estudio
        <input type="number" id="pr_feePct" min="0" max="100" step="0.5" placeholder="%" value="${document.getElementById('pr_feePct')?.value||''}" oninput="presRecalcTotals()" style="width:55px;font-family:'DM Mono',monospace;font-size:11px;padding:3px 6px;border:var(--border);border-radius:2px;background:var(--cream);outline:none;text-align:right;">%
        <span style="font-size:11px;color:var(--muted);">ó</span>
        <input type="number" id="pr_feeFixed" min="0" step="0.01" placeholder="€ fijo" value="${document.getElementById('pr_feeFixed')?.value||''}" oninput="presRecalcTotals()" style="width:80px;font-family:'DM Mono',monospace;font-size:11px;padding:3px 6px;border:var(--border);border-radius:2px;background:var(--cream);outline:none;text-align:right;">€
      </div>
    </td><td style="text-align:right;padding:5px 8px;color:var(--muted);">${fmtN(feeImp)}</td><td style="text-align:right;padding:5px 8px;color:var(--muted);">${fmtN(feeImp)}</td></tr>
    <tr><td colspan="3" style="padding:0;"></td></tr>
    <tr style="background:var(--ink);color:#fff;"><td style="padding:8px;font-family:'Cormorant Garamond',serif;font-size:15px;letter-spacing:0.05em;">TOTAL PRESUPUESTO</td><td></td><td style="text-align:right;padding:8px;font-size:14px;">${fmtN(grand)}</td></tr>`;
}

function presRenderPartidas(){
  const wrap=document.getElementById('presPartidas');
  if(!wrap) return;
  wrap.innerHTML=presState.partidas.map((p,pi)=>{
    const pNum=String(pi+1).padStart(2,'0');
    const pt=presCalcP(p);
    const subsHTML=p.subs.map((s,si)=>{
      const sCod=`${pNum}.${si+1}`;
      const showSub=p.subs.length>1||(s.nombre&&s.nombre.trim());
      const lineasHTML=s.lineas.length===0?`<div style="padding:8px 12px;font-size:11px;color:#bbb;">Sin líneas.</div>`:
        `<div style="display:grid;grid-template-columns:36px 1fr 50px 68px 105px 76px 90px 76px 90px 90px 26px;gap:3px;padding:3px 12px;background:var(--gold-light);font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;align-items:center;">
          <div></div><div>Descripción</div><div style="text-align:center;">UD</div><div style="text-align:right;">Cant.</div><div style="text-align:right;">P.Proveedor</div><div style="text-align:right;">Margen</div><div style="text-align:right;">P.Cli s/IVA</div><div style="text-align:right;">IVA</div><div style="text-align:right;">P.Cli c/IVA</div><div style="text-align:right;">Total c/IVA</div><div></div>
        </div>`+
        s.lineas.map((l,li)=>{
          const lCod=`${sCod}.${li+1}`;
          const c=presCalcL(l);
          return`<div class="pres-linea" data-lid="${l.id}" style="display:grid;grid-template-columns:36px 1fr 50px 68px 105px 76px 90px 76px 90px 90px 26px;gap:3px;padding:4px 12px;border-bottom:1px solid #f0ede8;align-items:start;">
            <div style="font-size:10px;color:var(--muted);padding-top:5px;">${lCod}</div>
            <div style="display:flex;flex-direction:column;gap:2px;">
              <div style="display:flex;gap:3px;align-items:center;">
                <input type="text" data-pf="desc" value="${l.desc}" placeholder="Descripción" style="font-family:'DM Mono',monospace;font-size:11px;padding:3px 5px;border:1px solid transparent;border-radius:2px;background:transparent;flex:1;outline:none;" onfocus="this.style.borderColor='var(--gold)';this.style.background='var(--white)'" onblur="this.style.borderColor='transparent';this.style.background='transparent'" oninput="presyncDesc(${p.id},${s.id},${l.id},'desc',this.value)">
                <button onclick="abrirCatalogoDesc(${p.id},${s.id},${l.id},'${slugClave(p.nombre)}')" title="Seleccionar del catálogo" style="flex-shrink:0;width:20px;height:20px;border:1px solid var(--warm);border-radius:2px;background:var(--cream);cursor:pointer;font-size:11px;color:var(--gold);display:flex;align-items:center;justify-content:center;padding:0;">≡</button>
              </div>
              <input type="text" data-pf="detalle" value="${l.detalle||''}" placeholder="Detalle (opcional)" style="font-family:'DM Mono',monospace;font-size:10px;padding:2px 5px;border:1px solid transparent;border-radius:2px;background:transparent;width:100%;outline:none;color:#999;" onfocus="this.style.borderColor='var(--gold)';this.style.background='var(--white)'" onblur="this.style.borderColor='transparent';this.style.background='transparent'" oninput="presyncDesc(${p.id},${s.id},${l.id},'detalle',this.value)">
              <input type="text" data-pf="url" value="${l.url||''}" placeholder="🔗 URL de referencia" style="font-family:'DM Mono',monospace;font-size:10px;padding:2px 5px;border:1px solid transparent;border-radius:2px;background:transparent;width:100%;outline:none;color:#b8974a;" onfocus="this.style.borderColor='var(--gold)';this.style.background='var(--white)'" onblur="this.style.borderColor='transparent';this.style.background='transparent'" oninput="presyncDesc(${p.id},${s.id},${l.id},'url',this.value)">
            </div>
            <input type="text" data-pf="ud" value="${l.ud}" style="font-family:'DM Mono',monospace;font-size:11px;padding:3px 5px;border:1px solid transparent;border-radius:2px;background:transparent;text-align:center;width:100%;outline:none;" onfocus="this.style.borderColor='var(--gold)';this.style.background='var(--white)'" onblur="this.style.borderColor='transparent';this.style.background='transparent'" oninput="presyncDesc(${p.id},${s.id},${l.id},'ud',this.value)">
            <input type="number" data-pf="cant" value="${l.cant}" min="0" step="0.01" style="font-family:'DM Mono',monospace;font-size:11px;padding:3px 5px;border:1px solid transparent;border-radius:2px;background:transparent;text-align:right;width:100%;outline:none;" onfocus="this.style.borderColor='var(--gold)';this.style.background='var(--white)'" onblur="this.style.borderColor='transparent';this.style.background='transparent'" oninput="presCalcRow(this.closest('.pres-linea'));presRecalcTotals()">
            <input type="number" data-pf="pProv" value="${l.pProv}" min="0" step="0.01" placeholder="0,00" style="font-family:'DM Mono',monospace;font-size:11px;padding:3px 5px;border:1px solid transparent;border-radius:2px;background:transparent;text-align:right;width:100%;outline:none;" onfocus="this.style.borderColor='var(--gold)';this.style.background='var(--white)'" onblur="this.style.borderColor='transparent';this.style.background='transparent'" oninput="presCalcRow(this.closest('.pres-linea'));presRecalcTotals()">
            ${presMargenSel(l.margen)}
            <div style="font-size:11px;text-align:right;padding:4px 2px;" data-pout="pCli">${fmtN(c.pCli)}</div>
            ${presIvaSel(l.iva)}
            <div style="font-size:11px;text-align:right;padding:4px 2px;" data-pout="pCliIva">${fmtN(c.pCliIva)}</div>
            <div style="font-size:11px;text-align:right;padding:4px 2px;color:var(--success);" data-pout="tCliIva">${fmtN(c.tCliIva)}</div>
            <button style="width:22px;height:22px;border:none;background:transparent;cursor:pointer;color:#ccc;font-size:14px;display:flex;align-items:center;justify-content:center;border-radius:2px;margin-top:2px;" onmouseover="this.style.color='#c00'" onmouseout="this.style.color='#ccc'" onclick="presDelLinea(${p.id},${s.id},${l.id})">×</button>
          </div>`;
        }).join('');
      return`<div>
        ${showSub?`<div style="display:flex;align-items:center;gap:8px;padding:5px 12px;background:#f0ede8;border-bottom:1px solid var(--warm);">
          <span style="font-size:10px;color:var(--muted);min-width:32px;">${sCod}</span>
          <input type="text" value="${s.nombre}" placeholder="Nombre del subapartado (ej. ASEO, SALÓN...)" style="flex:1;background:transparent;border:none;font-family:'DM Mono',monospace;font-size:12px;color:#555;outline:none;font-style:italic;" oninput="presyncSubNombre(${p.id},${s.id},this.value)">
          ${p.subs.length>1?`<button style="background:transparent;border:none;color:#ccc;cursor:pointer;font-size:14px;" onclick="presDelSub(${p.id},${s.id})">×</button>`:''}

        ${lineasHTML}
      </div>`;
    }).join('');

    return`<div style="background:var(--white);border:var(--border);margin-bottom:10px;">
      <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--ink);color:#fff;cursor:pointer;" onclick="presToggle(${p.id})">
        <span style="font-size:11px;color:var(--gold);min-width:26px;">${pNum}.</span>
        <div style="flex:1;min-width:0;" onclick="event.stopPropagation()">
          <input type="text" value="${p.nombre}" placeholder="Nombre de la partida" style="background:transparent;border:none;color:#fff;font-family:'DM Mono',monospace;font-size:13px;width:100%;outline:none;" oninput="presyncPartidaNombre(${p.id},this.value)">
        </div>
        <span style="font-size:11px;color:var(--gold-light);white-space:nowrap;" data-ptot="${p.id}">${fmtN(pt.tCliIva)} IVA inc.</span>

        <span style="font-size:13px;color:#888;transition:transform 0.2s;${p.collapsed?'':'transform:rotate(180deg)'}">▾</span>
      </div>
      <div style="${p.collapsed?'display:none;':''}">
        ${subsHTML}
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;padding:8px 12px;border-top:var(--border);background:var(--cream);">
          <div style="display:flex;gap:8px;">
            <button class="add-sm" onclick="presAddLinea(${p.id},${p.subs[p.subs.length-1].id})">+ Añadir línea</button>
            <button class="add-sm" onclick="presAddSub(${p.id})">+ Añadir subapartado</button>
          </div>
          <div style="display:flex;gap:1rem;font-size:11px;">
            <span style="color:var(--muted);">Sin IVA: <strong style="color:var(--ink);">${fmtN(pt.tCli)}</strong></span>
            <span style="color:var(--muted);">Con IVA: <strong style="color:var(--ink);">${fmtN(pt.tCliIva)}</strong></span>
            <span style="color:var(--muted);">Margen: <strong style="color:var(--ink);">${fmtN(pt.margenE)}</strong></span>
          </div>
        </div>

function generarListaCompra(){
  const seleccionadas = [];
  document.querySelectorAll('[id^="chk_lc_"]').forEach(chk=>{
    if(chk.checked) seleccionadas.push(+chk.value);
  });
  if(!seleccionadas.length){ toast('Selecciona al menos una partida'); return; }
  const mostrarPrecios = document.getElementById('lc_precios')?.value === 'si';
  closeModal();

  // Recoger solo líneas con URL de partidas seleccionadas
  const items = [];
  presState.partidas.forEach((p,pi)=>{
    if(!seleccionadas.includes(p.id)) return;
    const pN = String(pi+1).padStart(2,'0');
    p.subs.forEach((s,si)=>{
      s.lineas.forEach((l,li)=>{
        if(l.url && l.url.trim()){
          const c = presCalcL(l);
          items.push({
            cod: `${pN}.${si+1}.${li+1}`,
            partida: p.nombre,
            desc: l.desc||'—',
            detalle: l.detalle||'',

async function guardarPresupuesto(){
  // Sincronizar todos los campos del DOM al estado antes de guardar
  document.querySelectorAll('.pres-linea').forEach(row=>{
    const lid = +row.dataset.lid;
    for(const p of presState.partidas){
      for(const s of p.subs){
        const l = s.lineas.find(x=>x.id===lid);
        if(l){
          l.desc    = row.querySelector('[data-pf="desc"]')?.value    || l.desc;
          l.detalle = row.querySelector('[data-pf="detalle"]')?.value || l.detalle;
          l.ud      = row.querySelector('[data-pf="ud"]')?.value      || l.ud;
          l.url     = row.querySelector('[data-pf="url"]')?.value     || '';
          l.cant    = numP(row.querySelector('[data-pf="cant"]')?.value);
          l.pProv   = numP(row.querySelector('[data-pf="pProv"]')?.value);
          l.margen  = numP(row.querySelector('[data-pt="margen"]')?.value);
          l.iva     = numP(row.querySelector('[data-pt="iva"]')?.value);
        }
      }
    }
  });

  const numero=document.getElementById('pr_num')?.value||'';
  const proyecto=document.getElementById('pr_proyecto')?.value||'';
  if(!proyecto){ toast('Introduce el nombre del proyecto'); return; }
  const cli_id=document.getElementById('pr_cli')?.value||'';
  const cli=G.clientes.find(x=>String(x.id)===cli_id);
  let totSinIva=0,totConIva=0;
  const lineas=[];
  presState.partidas.forEach((p,pi)=>{
    const pN=String(pi+1).padStart(2,'0');
    p.subs.forEach((s,si)=>{
      const sCod=`${pN}.${si+1}`;
      s.lineas.forEach((l,li)=>{
        const c=presCalcL(l);
        totSinIva+=c.tCli; totConIva+=c.tCliIva;
        lineas.push({partida:p.nombre,sub:s.nombre,cod:`${sCod}.${li+1}`,desc:l.desc,detalle:l.detalle,ud:l.ud,cant:l.cant,pProv:l.pProv,margen:l.margen,iva:l.iva,pCli:c.pCli,pCliIva:c.pCliIva,tCliIva:c.tCliIva,url:l.url||''});
      });
    });
  });
  const feePct=numP(document.getElementById('pr_feePct')?.value||0);
  const feeFixed=numP(document.getElementById('pr_feeFixed')?.value||0);
  const feeImp=feePct>0?totSinIva*(feePct/100):feeFixed;
  const pres={numero,cliente_id:cli_id,cliente_nombre:cli?.nombre||'',proyecto,direccion:document.getElementById('pr_dir')?.value||'',fecha:document.getElementById('pr_fecha')?.value||'',validez:document.getElementById('pr_validez')?.value||'30',forma_pago:document.getElementById('pr_pago')?.value||'',fee:feeImp,total_sin_iva:totSinIva,total_con_iva:totConIva,estado:document.getElementById('pr_estado')?.value||'Borrador',lineas};
  const btn=event.target; btn.disabled=true; btn.textContent='Guardando...';
  let r;
  if(presState.editandoId){
    // Borrar líneas antiguas y guardar nuevas
    await api('deleteLineasPresupuesto',{id:presState.editandoId});
    pres.id = presState.editandoId;
    r = await api('updatePresupuesto',{p:pres});
  } else {
    r = await api('savePresupuesto',{p:pres});
  }
  if(r&&r.ok){ toast(presState.editandoId?'Presupuesto actualizado':'Presupuesto guardado'); await loadData(); renderPresupuestos(); }
  else { toast('Error al guardar'); btn.disabled=false; btn.textContent=presState.editandoId?'Guardar cambios':'Guardar'; }
}

    return `<div class="config-item">
      <div style="flex:1;">
        <div style="font-size:13px;font-weight:500;">${parts[0]||item.valor}</div>

// ── UTILIDADES FECHA ─────────────────────────────────────────────
function fmtFecha(v){
  if(!v) return '—';
  // Si ya es dd/mm/yyyy devolver tal cual
  if(/^\d{2}\/\d{2}\/\d{4}$/.test(String(v))) return v;
  // Si es ISO o timestamp
  try {
    const d = new Date(v);
    if(isNaN(d)) return String(v);
    return d.toLocaleDateString('es-ES');
  } catch(e){ return String(v); }
}

async function cargarPresupuesto(id){
  closeDrawer();
  toast('Cargando presupuesto...');
  // Obtener líneas desde Sheets
  const r = await apiGet('getLineasPresupuesto&id='+id, true);
  const p = G.presupuestos.find(x=>String(x.id)===String(id));
  if(!p){ toast('Presupuesto no encontrado'); return; }

  // Reconstruir presState desde las líneas guardadas
  presState = { partidas:[], clienteId: String(p.cliente_id), clienteNombre: p.cliente_nombre, editandoId: String(id) };
  _presId = 1;

  const lineas = (r && !r.error) ? r : [];

  // Agrupar líneas guardadas por nombre de partida
  const lineasPorPartida = {};
  lineas.forEach(l => {
    const key = l.partida || 'Sin nombre';
    if(!lineasPorPartida[key]) lineasPorPartida[key] = [];
    lineasPorPartida[key].push(l);
  });

  // Cargar siempre las partidas por defecto
  // Si una partida tiene líneas guardadas, las carga; si no, aparece vacía
  PARTIDAS_DEFAULT.forEach(nombre => {
    const pid = npid();
    const sid = npid();
    const linsGuardadas = lineasPorPartida[nombre] || [];
    const lineasArr = linsGuardadas.map(l => ({
      id: npid(), desc: l.desc||'', detalle: l.detalle||'',
      ud: l.ud||'UD', cant: numP(l.cant), pProv: numP(l.pProv),
      margen: numP(l.margen), iva: numP(l.iva), url: String(l.url||'')
    }));
    presState.partidas.push({ id:pid, nombre, collapsed:false,
      subs:[{ id:sid, nombre:'', lineas:lineasArr }]
    });
    // Marcar como procesada
    delete lineasPorPartida[nombre];
  });

  // Si había partidas personalizadas no incluidas en las default, añadirlas también
  Object.entries(lineasPorPartida).forEach(([nombre, lins]) => {
    const pid = npid();
    const sid = npid();
    const lineasArr = lins.map(l => ({
      id: npid(), desc: l.desc||'', detalle: l.detalle||'',
      ud: l.ud||'UD', cant: numP(l.cant), pProv: numP(l.pProv),
      margen: numP(l.margen), iva: numP(l.iva), url: String(l.url||'')
    }));
    presState.partidas.push({ id:pid, nombre, collapsed:false,
      subs:[{ id:sid, nombre:'', lineas:lineasArr }]
    });
  });

  const c = document.getElementById('content');
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('nav-presupuestos')?.classList.add('active');
  presRenderEditor(p);
}

async function exportPresPDFGuardado(id){
  const r = await apiGet('getLineasPresupuesto&id='+id, true);
  const p = G.presupuestos.find(x=>String(x.id)===String(id));
  if(!p) return;
  const lineas = (r && !r.error) ? r : [];
  // Reconstruir partidas temporalmente para el PDF
  const partidasMap = {};
  lineas.forEach(l=>{
    const key = l.partida||'Sin nombre';
    if(!partidasMap[key]) partidasMap[key]=[];
    partidasMap[key].push(l);
  });
  const partidasPDF = Object.entries(partidasMap).map(([nombre,lins])=>({
    nombre, lineas: lins.map(l=>({desc:l.desc,detalle:l.detalle,ud:l.ud,cant:numP(l.cant),pProv:numP(l.pProv),margen:numP(l.margen),iva:numP(l.iva)}))
  }));
  const fechaFmt = fmtFecha(p.fecha);
  const pago = p.forma_pago||'';
  const validez = p.validez||30;
  let totSin=0, totCon=0;
  const pHTML = partidasPDF.map((pt,pi)=>{
    if(!pt.lineas.length) return '';
    const pN=String(pi+1).padStart(2,'0');
    const lHTML = pt.lineas.map((l,li)=>{
      const c=presCalcL(l);
      totSin+=c.tCli; totCon+=c.tCliIva;
      return`<tr>
        <td style="padding:3px 6px;border-bottom:1px solid #e2dbd0;color:#888;">${pN}.${li+1}</td>
        <td style="padding:3px 6px;border-bottom:1px solid #e2dbd0;"><div>${l.desc||'—'}</div>${l.detalle?`<div style="font-size:8px;color:#999;">${l.detalle}</div>`:''}</td>
        <td style="padding:3px 6px;border-bottom:1px solid #e2dbd0;text-align:center;">${l.ud}</td>
        <td style="padding:3px 6px;border-bottom:1px solid #e2dbd0;text-align:right;">${numP(l.cant).toLocaleString('es-ES')}</td>
        <td style="padding:3px 6px;border-bottom:1px solid #e2dbd0;text-align:right;white-space:nowrap;">${fmtN(c.pCli)}</td>
        <td style="padding:3px 6px;border-bottom:1px solid #e2dbd0;text-align:right;white-space:nowrap;">${fmtN(c.pCliIva)}</td>
        <td style="padding:3px 6px;border-bottom:1px solid #e2dbd0;text-align:right;white-space:nowrap;">${fmtN(c.tCliIva)}</td>
      </tr>`;
    }).join('');
    const stCli=pt.lineas.reduce((a,l)=>a+presCalcL(l).tCli,0);
    const stCon=pt.lineas.reduce((a,l)=>a+presCalcL(l).tCliIva,0);
    return`<div style="background:#1c1a18;color:#f8f5f0;padding:5px 8px;font-size:9px;letter-spacing:0.08em;margin:1rem 0 0;">${pN}. ${pt.nombre}</div>
    <table style="width:100%;border-collapse:collapse;font-size:9px;">
      <thead><tr>
        <th style="background:#e8dcc8;padding:3px 6px;font-size:7px;color:#8a8278;font-weight:400;text-align:left;width:40px;">Cód.</th>
        <th style="background:#e8dcc8;padding:3px 6px;font-size:7px;color:#8a8278;font-weight:400;text-align:left;">Descripción</th>
        <th style="background:#e8dcc8;padding:3px 6px;font-size:7px;color:#8a8278;font-weight:400;text-align:center;">UD</th>
        <th style="background:#e8dcc8;padding:3px 6px;font-size:7px;color:#8a8278;font-weight:400;text-align:right;">Cant.</th>
        <th style="background:#e8dcc8;padding:3px 6px;font-size:7px;color:#8a8278;font-weight:400;text-align:right;">P.Unit s/IVA</th>
        <th style="background:#e8dcc8;padding:3px 6px;font-size:7px;color:#8a8278;font-weight:400;text-align:right;">P.Unit c/IVA</th>
        <th style="background:#e8dcc8;padding:3px 6px;font-size:7px;color:#8a8278;font-weight:400;text-align:right;">Total c/IVA</th>
      </tr></thead>
      <tbody>${lHTML}
      <tr><td colspan="5" style="padding:3px 6px;background:#f8f5f0;border-top:1px solid #1c1a18;"></td>
        <td style="padding:3px 6px;background:#f8f5f0;font-size:8px;color:#8a8278;">Subtotal s/IVA</td>
        <td style="padding:3px 6px;background:#f8f5f0;text-align:right;">${fmtN(stCli)}</td></tr>
      <tr><td colspan="5" style="padding:3px 6px;background:#f8f5f0;"></td>
        <td style="padding:3px 6px;background:#f8f5f0;font-size:8px;color:#8a8278;">Subtotal c/IVA</td>
        <td style="padding:3px 6px;background:#f8f5f0;text-align:right;">${fmtN(stCon)}</td></tr>
      </tbody>
    </table>`;
  }).join('');
  const feeImp = numP(p.fee)||0;
  const grand = numP(p.total_con_iva)||totCon+feeImp;
  const content=`<div style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;letter-spacing:0.25em;color:#1c1a18;">LATON <em style="color:#b8974a;font-style:normal;">Studio</em></div>
  <div style="font-size:9px;color:#888;letter-spacing:0.1em;margin-bottom:1.5rem;">PRESUPUESTO</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:2rem;margin:1.2rem 0;padding-bottom:1.2rem;border-bottom:2px solid #1c1a18;">
    <div><div style="font-size:8px;color:#8a8278;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:3px;">Cliente</div>
      <div style="font-size:12px;">${p.cliente_nombre||'—'}</div>
      ${p.direccion?`<div style="font-size:10px;color:#888;margin-top:3px;">${p.direccion}</div>`:''}
    </div>
    <div style="text-align:right;">
      <div style="font-size:8px;color:#8a8278;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:3px;">Nº Presupuesto</div><div style="font-size:12px;">${p.numero||'—'}</div>
      <div style="font-size:8px;color:#8a8278;text-transform:uppercase;letter-spacing:0.1em;margin:6px 0 3px;">Fecha</div><div style="font-size:12px;">${fechaFmt}</div>
      <div style="font-size:8px;color:#8a8278;text-transform:uppercase;letter-spacing:0.1em;margin:6px 0 3px;">Válido</div><div style="font-size:12px;">${validez} días desde emisión</div>
    </div>
  </div>
  <div style="font-family:'Cormorant Garamond',serif;font-size:14px;color:#555;margin-bottom:1.5rem;font-style:italic;">${p.proyecto||'—'}</div>
  ${pHTML}
  <div style="margin-top:2rem;border-top:2px solid #1c1a18;padding-top:1rem;">
    <div style="display:flex;justify-content:space-between;padding:4px 0;font-size:11px;border-bottom:1px solid #e2dbd0;"><span>Total obra sin IVA</span><span>${fmtN(numP(p.total_sin_iva))}</span></div>
    <div style="display:flex;justify-content:space-between;padding:4px 0;font-size:11px;border-bottom:1px solid #e2dbd0;"><span>Total obra con IVA</span><span>${fmtN(grand)}</span></div>
    ${feeImp>0?`<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:11px;border-bottom:1px solid #e2dbd0;"><span>Fee del estudio</span><span>${fmtN(feeImp)}</span></div>`:''}
    <div style="display:flex;justify-content:space-between;background:#1c1a18;color:#f8f5f0;padding:9px 10px;margin-top:6px;font-size:13px;"><span>TOTAL PRESUPUESTO</span><span>${fmtN(grand)}</span></div>
  </div>
  ${pago?`<div style="margin-top:1.5rem;padding-top:1rem;border-top:1px solid #e0d8cc;font-size:9px;color:#8a8278;line-height:1.8;"><strong>Forma de pago:</strong> ${pago}</div>`:''}
  <div style="margin-top:2rem;padding-top:1rem;border-top:1px solid #e0d8cc;font-size:8px;color:#bbb;text-align:center;">Presupuesto válido ${validez} días · Laton Studio</div>`;
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Presupuesto — Laton Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'DM Mono',monospace;font-size:11px;color:#1c1a18;padding:2cm;background:#fff;}@media print{body{padding:1.5cm;}@page{margin:1cm;size:A4;}}</style>
  </head><body>${content}</body></html>`);
  w.document.close(); setTimeout(()=>w.print(),800);
}

// ── CARGA DE DATOS ───────────────────────────────────────────────
async function loadConfig(){
  const r=await apiGet('getConfig');
  if(r&&!r.error) G.config=r;
  // Cargar datos del estudio desde config
  G.estudio = {
    nombre: (G.config['estudio_nombre']||[{valor:'LATON studio'}])[0]?.valor||'LATON studio',
    cif:    (G.config['estudio_cif']   ||[{valor:'76088698Y'}])[0]?.valor||'76088698Y',
    tel:    (G.config['estudio_tel']   ||[{valor:'+34 692 819 091'}])[0]?.valor||'+34 692 819 091',
    email:  (G.config['estudio_email'] ||[{valor:''}])[0]?.valor||'',
    web:    (G.config['estudio_web']   ||[{valor:''}])[0]?.valor||'',
    dir:    (G.config['estudio_dir']   ||[{valor:''}])[0]?.valor||'',
  };
}

async function loadData(){
  const [cli,prov,pres,tar]=await Promise.all([
    apiGet('getClientes'),apiGet('getProveedores'),
    apiGet('getPresupuestos'),apiGet('getTareas')
  ]);
  if(cli&&!cli.error) G.clientes=cli;
  if(prov&&!prov.error) G.proveedores=prov;
  if(pres&&!pres.error) G.presupuestos=pres;
  if(tar&&!tar.error) G.tareas=tar;
}

// ── INIT ─────────────────────────────────────────────────────────
async function init(){
  document.getElementById('content').innerHTML='<div class="loading">Conectando con la base de datos...</div>';
  await loadConfig();
  await loadData();
  showPage('dashboard');
}

init();
</script>
